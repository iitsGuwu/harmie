<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harmie Pageant — Community Voting & Gallery</title>
  <meta name="description" content="Vote for your favorite Harmies in head-to-head charm contests. Browse, sort, and rank the full live Harmies collection from Solana." />
  <meta name="theme-color" content="#5b58e8" />
  <meta property="og:title" content="Harmie Pageant — Community Voting & Gallery" />
  <meta property="og:description" content="Explore the full live Harmies collection and vote in the Pageant!" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/og-image.png" />
  <script src="/theme-init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen" role="status" aria-live="polite">
    <div class="loading-content">
      <div class="loading-logo">
        <span class="logo-text">HARMIE</span>
        <span class="logo-sub">PAGEANT</span>
      </div>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <p class="loading-text" id="loading-text">Summoning the Harmies...</p>

  </div>

          <span class="logo-badge logo-badge-alt">PAGEANT</span>
        </a>
        <div class="nav-links">
          <a href="#gallery" class="nav-link" data-page="gallery" id="nav-gallery">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M5 4h6a3 3 0 0 1 3 3v13H8a3 3 0 0 0-3 3V4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M19 4h-6a3 3 0 0 0-3 3v13h6a3 3 0 0 1 3 3V4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              </svg>
            </span>
            Gallery
          </a>
          <a href="#pageant" class="nav-link active" data-page="pageant" id="nav-pageant">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="m7 5 5 5m0 0 5-5m-5 5 5 5m-5-5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M7 5v14m10-14v14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            Pageant
          </a>
          <a href="#leaderboard" class="nav-link" data-page="leaderboard" id="nav-leaderboard">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M7 4h10v4a5 5 0 0 1-10 0V4Z" stroke="currentColor" stroke-width="2"/>
                <path d="M9 16h6m-7 4h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M17 6h2a2 2 0 0 1-2 2m-10-2H5a2 2 0 0 0 2 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            Rankings
          </a>
        </div>
        <div class="nav-external">
          <a href="https://www.tensor.trade/trade/c7d45db9-0726-459c-bc42-afc8ee32e10a" target="_blank" rel="noopener noreferrer" class="nav-ext-link" id="nav-tensor" title="Trade on Tensor">
            <span>Tensor</span>
          </a>
          <a href="https://magiceden.io/marketplace/harmies" target="_blank" rel="noopener noreferrer" class="nav-ext-link" id="nav-magiceden" title="Trade on Magic Eden">
            <span>Magic Eden</span>
          </a>
          <a id="nav-github" target="_blank" rel="noopener noreferrer" class="nav-ext-link nav-github" title="View Source on GitHub" aria-label="View source on GitHub">

          </a>
        </div>
        <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="mobile-menu">
          <span></span><span></span><span></span>
        </button>
        <button class="theme-toggle" id="theme-toggle" aria-label="Switch theme mode (light, mid, dark)" title="Switch theme mode">
          <span class="theme-toggle-track" aria-hidden="true">
            <span class="theme-toggle-thumb"></span>
          </span>
          <span class="theme-toggle-label" id="theme-toggle-label">MID</span>
        </button>
      </div>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="mobile-menu hidden" aria-label="Mobile navigation">
      <a href="#gallery" class="mobile-link" data-page="gallery">Gallery</a>
      <a href="#pageant" class="mobile-link" data-page="pageant">Pageant</a>
      <a href="#leaderboard" class="mobile-link" data-page="leaderboard">Rankings</a>
      <hr />
      <a href="https://www.tensor.trade/trade/c7d45db9-0726-459c-bc42-afc8ee32e10a" target="_blank" rel="noopener noreferrer" class="mobile-link">Tensor</a>
      <a href="https://magiceden.io/marketplace/harmies" target="_blank" rel="noopener noreferrer" class="mobile-link">Magic Eden</a>
      <a id="mobile-github" target="_blank" rel="noopener noreferrer" class="mobile-link">GitHub</a>
    </div>

    <!-- Page Container -->
    <main id="page-container" class="page-container">
      <!-- Pages rendered dynamically -->
    </main>

    <!-- NFT Detail Modal -->
    <div id="nft-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
      <div class="modal-content comic-panel">
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
        <div id="modal-body"></div>
      </div>
    </div>

    <!-- Glamour Effect Overlay -->
    <div id="glamour-effect" class="glamour-effect hidden" aria-hidden="true"></div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-inner">
        <p>Community-built for Harmies holders</p>
        <p class="footer-note">
          Not affiliated with <a href="https://www.neuko.ai/" target="_blank" rel="noopener noreferrer"><u>Neuko</u></a> or the <a href="https://www.harmonyrx.net/" target="_blank" rel="noopener noreferrer"><u>Harmony</u></a> project.

        <p class="footer-note">
